<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-10">

      <h1 class="text-center mb-4 text-success">
        <i class="bi bi-tags"></i> Gestion des Catégories
      </h1>

      <!-- Formulaire d'ajout/édition -->
      <div class="card shadow-lg border-0 mb-5">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-3">{{ isEditing ? 'Modifier la catégorie' : 'Nouvelle Catégorie' }}</h5>
          <div class="row g-3">
            <div class="col-md-5">
              <input type="text" [(ngModel)]="categoryForm.name" class="form-control form-control-lg" placeholder="Nom de la catégorie...">
            </div>
            <div class="col-md-5">
              <select [(ngModel)]="categoryForm.parentId" class="form-select form-select-lg">
                <option [value]="null">Aucun parent (Racine)</option>
                <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-success btn-lg w-100 btn-outline-success fw-bold" (click)="saveCategory()">
                {{ isEditing ? 'Mettre à jour' : 'Ajouter' }}
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Liste des catégories -->
      <div class="card shadow-sm border-0 mt-4">
        <div class="card-header bg-white py-3">
          <h5 class="fw-bold mb-0 text-success"><i class="bi bi-diagram-3"></i> Structure hiérarchique des catégories</h5>
        </div>
        <div class="card-body bg-light" style="max-height: 500px; overflow-y: auto;">

          <app-category-list
            [allCategories]="categories"
            [selectedIds]="selectedCategoryIds"
            (selectionChange)="onAdminCategorySelect($event)">
          </app-category-list>

        </div>
      </div>

    </div>
  </div>
</div>
