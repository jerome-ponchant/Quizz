<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-10">

      <h1 class="text-center mb-4 text-success">
        <i class="bi bi-tags"></i> Gestion des Catégories
      </h1>

      <!-- Formulaire d'ajout/édition -->
      <div class="card shadow-lg border-0 mb-5">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-3">{{ isEditing ? 'Modifier la catégorie' : 'Nouvelle Catégorie' }}</h5>
          <div class="row g-3">
            <div class="col-md-5">
              <input type="text" [(ngModel)]="categoryForm.name" class="form-control form-control-lg" placeholder="Nom de la catégorie...">
            </div>
            <div class="col-md-5">
              <select [(ngModel)]="categoryForm.parentId" class="form-select form-select-lg">
                <option [value]="null">Aucun parent (Racine)</option>
                <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
              </select>
            </div>
            <div class="col-md-2">
              <button class="btn btn-success btn-lg w-100 btn-outline-success fw-bold" (click)="saveCategory()">
                {{ isEditing ? 'Mettre à jour' : 'Ajouter' }}
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Liste des catégories -->
      <div class="row g-3">
        <div class="col-md-4 category-card-animate" *ngFor="let cat of categories">
          <div class="card shadow-sm border-2 h-100 btn-outline-success">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <h6 class="mb-0 fw-bold text-dark">{{ cat.name }}</h6>
                <small class="text-muted" *ngIf="cat.parent">Parent: {{ getCategoryName(cat.parent.toString()) }}</small>
                <span *ngIf="!cat.parent" class="badge bg-light text-success border">Racine</span>
              </div>
              <div class="btn-group">
                <button class="btn btn-sm btn-light text-primary" (click)="editCategory(cat)"><i class="bi bi-pencil"></i></button>
                <button class="btn btn-sm btn-light text-danger" (click)="deleteCategory(cat.id!)"><i class="bi bi-trash"></i></button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
