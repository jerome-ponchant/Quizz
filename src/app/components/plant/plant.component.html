<div class="container py-5">
  <h1 class="text-success mb-4"><i class="bi bi-tree-fill"></i> Inventaire des Plantes</h1>

  <!-- Formulaire -->
  <app-plant-detail
  #plantDetail
  [plant]="isEditing ? plantForm : null"
  [allCategories]="categories"
  [uploadPrefix]="(uploadPrefix$ | async) ?? ''"
  (actionCompleted)="onPlantActionCompleted()"
  (applyImplications)="handleImplicationsFromDetail($event, plantDetail)">
</app-plant-detail>


  <div class="border-2 border-primary rounded row mb-4">
    <div class="col-md-5 col-lg-4">
      <div class="input-group shadow-sm">
        <span class="input-group-text bg-white border-end-0 text-muted">
          <i class="bi bi-search"></i>
        </span>
        <input type="text" [(ngModel)]="searchTerm" (input)="onSearch()" class="form-control border-start-0 ps-0"
          placeholder="Rechercher partout par nom...">
        <button *ngIf="searchTerm" class="btn btn-outline-secondary border-start-0"
          (click)="searchTerm = ''; onSearch()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>
    <div class="col-md-5">
      <label class="fw-bold text-muted small mb-1">Filtrer par catégorie</label>
      <div class="shadow-sm border rounded bg-white px-2" style="padding-top: 4px; padding-bottom: 4px;">
        <app-category-list [allCategories]="categories" [selectedIds]="filterCategoryIdsSet" [isDropdownMode]="true"
          (selectedIdsChange)="onFilterCategoryChange($event)">
        </app-category-list>
      </div>
    </div>
    <div class="col-md-2" *ngIf="searchTerm || selectedFilterCategoryIds">
      <button class="btn btn-outline-danger w-100" (click)="clearFilters()">
        <i class="bi bi-trash"></i> Effacer
      </button>
    </div>
  </div>
  <!-- Grille des plantes -->
  <div class="row g-4">
    <div class="col-md-4 col-lg-3" *ngFor="let plant of plants">
      <div class="card h-100 shadow-sm border-2 btn-outline-success success-anim">
        <!-- Image de la plante -->
        <div class="ratio ratio-4x3 bg-light overflow-hidden border-bottom">

          <div class="w-100 h-100 position-absolute top-0 start-0">
            <app-plant-image-manager [plant]="plant" [prefix]="(uploadPrefix$ | async) ?? ''" [readOnly]="true"
              [displayMode]="'carousel'">
            </app-plant-image-manager>
          </div>

          <div *ngIf="!plant.images || plant.images.length === 0"
            class="d-flex align-items-center justify-content-center text-muted small font-italic position-absolute w-100 h-100 top-0 start-0 bg-light">
            <i class="bi bi-image me-1"></i> Aucune illustration
          </div>
        </div>

        <div class="card-body">
          <h5 class="card-title fw-bold text-dark">{{ plant.name }}</h5>
          <p *ngIf="plant.commonName" class="text-muted small italic mb-2">
            {{ plant.commonName }}
          </p>
          <!-- Affichage des catégories associées -->
          <div class="mb-3">
            <span *ngFor="let cat of plant.categories" class="badge bg-light text-success border me-1">
              {{ cat.name }}
            </span>
          </div>

          <!-- Actions -->
          <div class="d-flex justify-content-between border-top pt-3">
            <button class="btn btn-sm btn-outline-primary border-0" (click)="editPlant(plant)">
              <i class="bi bi-pencil-square"></i> Modifier
            </button>
            <button class="btn btn-sm btn-outline-danger border-0" (click)="deletePlant(plant.id!)">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>

        <div class="card-footer bg-white border-0">
          <small class="text-muted italic">ID: #{{ plant.id }}</small>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mt-4">
    <div class="text-muted">
      Affichage de {{ plants.length }} sur {{ totalItems }} plantes
    </div>

    <nav aria-label="Pagination">
      <ul class="pagination mb-0">
        <li class="page-item" [class.disabled]="currentPage === 1">
          <button class="page-link" (click)="loadData(currentPage - 1)">Précédent</button>
        </li>

        <li class="page-item active">
          <span class="page-link">Page {{ currentPage }} sur {{ totalPages }}</span>
        </li>

        <li class="page-item" [class.disabled]="currentPage >= totalPages">
          <button class="page-link" (click)="loadData(currentPage + 1)">Suivant</button>
        </li>
      </ul>
    </nav>
  </div>

</div>
